              schema:
                "$ref": "#/components/schemas/ErrorResponse"
  "/api/v1/syncs/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: UUID of the sync to retrieve. The sync must belong to the authenticated user's family.
      schema:
        type: string
        format: uuid
    get:
      summary: Get a sync
      description: Returns sanitized status metadata for a single family-scoped sync.
      tags:
      - Sync
      security:
      - apiKeyAuth: []
      responses:
        '200':
          description: sync shown
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SyncResponse"
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '403':
          description: forbidden
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
